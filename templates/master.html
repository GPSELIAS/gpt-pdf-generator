<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>{{ title }}</title>

  <style>
    /* ---------- Page Setup ---------- */
    @page {
      size: A4;
      margin: 22mm 20mm 22mm 20mm;

      /* Footer text + page number */
      @bottom-left {
        content: "Nister GmbH – intern";
        font-size: 9pt;
        color: #6B7280;
      }
      @bottom-right {
        content: "Seite " counter(page) " / " counter(pages);
        font-size: 9pt;
        color: #6B7280;
      }
    }

    /* Make sure WeasyPrint prints background colors */
    html { -weasy-print-color-adjust: exact; }

    body {
      font-family: "DejaVu Sans", Arial, Helvetica, sans-serif;
      color: #111827;
      font-size: 11pt;
      line-height: 1.55;
      margin: 0;
      padding: 0;
    }

    /* ---------- Cover ---------- */
    .cover-header {
      width: 100%;
      display: block;
      margin: 0;
      padding: 0;
    }

    .cover {
      text-align: center;
      margin-top: 30mm;
    }

    .cover-title {
      font-size: 26pt;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin: 0 0 8mm 0;
    }

    .cover-subtitle {
      font-size: 16pt;
      font-weight: 700;
      color: #0B4F8A;
      margin: 0 0 6mm 0;
    }

    .cover-meta {
      font-size: 10.5pt;
      color: #6B7280;
      margin-top: 8mm;
    }

    .divider {
      width: 60%;
      margin: 14mm auto 0 auto;
      border: 0;
      border-top: 2px solid #E5E7EB;
    }

    .page-break {
      page-break-after: always;
    }

    /* ---------- Content ---------- */
    h1 {
      font-size: 18pt;
      margin: 0 0 6mm 0;
      padding-bottom: 3mm;
      border-bottom: 2px solid #E5E7EB;
      color: #111827;
    }

    h2 {
      font-size: 13.5pt;
      margin: 10mm 0 4mm 0;
      color: #0B4F8A;
    }

    p {
      margin: 0 0 5mm 0;
    }

    .callout {
      background: #F5F7FB;
      border-left: 5px solid #0B4F8A;
      padding: 10mm;
      margin: 8mm 0;
      border-radius: 10px;
      color: #111827;
    }

    .muted {
      color: #6B7280;
      font-size: 10pt;
    }

    /* ---------- Footer Logo (fixed on every page) ---------- */
    .footer-logo {
      position: fixed;
      right: 20mm;
      bottom: 12mm;
      width: 20mm;
      opacity: 0.95;
    }

    /* Optional: nicer list */
    ul {
      margin: 0 0 6mm 18px;
      padding: 0;
    }
    li { margin: 0 0 2.5mm 0; }

    /* If content contains line breaks, preserve them */
    .content {
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <!-- COVER -->
  <img src="assets/nisterheaderbild.png" class="cover-header" alt="Headerbild" />

  <div class="cover">
    <div class="cover-title">{{ title }}</div>

    {% if subtitle %}
      <div class="cover-subtitle">{{ subtitle }}</div>
    {% endif %}

    <div class="cover-meta">
      {% if tagline %}{{ tagline }}<br />{% endif %}
      Stand: {{ date }}
    </div>

    <hr class="divider" />
    <div class="muted" style="margin-top: 8mm;">
      Hinweis: Dieses Dokument ist eine interne Arbeitsfassung.
    </div>
  </div>

  <div class="page-break"></div>

  <!-- CONTENT -->
  <h1>{{ section_title }}</h1>

  <div class="content">
    {{ content }}
  </div>

  {% if callout %}
    <div class="callout">{{ callout }}</div>
  {% endif %}

  <!-- Footer Logo on each page -->
  <img src="assets/gpsholding.png" class="footer-logo" alt="Logo" />

</body>
</html>
