<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <style>
    @page {
      size: A4;
      margin: 24mm 22mm 24mm 22mm;

      @bottom-left {
        content: "Nister GmbH – intern";
        font-size: 9px;
        color: #6B7280;
      }
      @bottom-center {
        content: "Seite " counter(page) " / " counter(pages);
        font-size: 9px;
        color: #6B7280;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #111827;
      font-size: 11pt;
      line-height: 1.55;
      margin: 0;
    }

    .cover-header {
      width: 100%;
      display: block;
    }

    .cover {
      text-align: center;
      padding-top: 18mm;
    }

    .title {
      font-size: 26pt;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin: 18mm 0 6mm;
    }

    .subtitle {
      font-size: 16pt;
      font-weight: 700;
      color: #0B4F8A;
      margin: 0 0 8mm;
    }

    .meta {
      font-size: 10pt;
      color: #6B7280;
    }

    .divider {
      margin: 14mm auto 0;
      width: 65%;
      height: 2px;
      background: #E5E7EB;
      border-radius: 1px;
    }

    h1 {
      font-size: 18pt;
      margin: 0 0 6mm;
      padding-bottom: 3mm;
      border-bottom: 2px solid #E5E7EB;
    }

    p {
      margin: 0 0 6mm;
      white-space: pre-wrap; /* keeps line breaks from the input */
    }

    .callout {
      margin: 8mm 0 0;
      padding: 8mm;
      background: #F5F7FB;
      border-left: 5px solid #0B4F8A;
      border-radius: 8px;
      color: #111827;
      font-size: 10.5pt;
    }

    .pagebreak {
      page-break-after: always;
    }
  </style>
</head>

<body>

  <!-- COVER -->
  <img src="../assets/nisterheaderbild.png" class="cover-header" alt="Header" />

  <div class="cover">
    <div class="title">{{ title }}</div>
    {% if subtitle %}
      <div class="subtitle">{{ subtitle }}</div>
    {% endif %}
    <div class="meta">
      {{ tagline }}<br />
      Stand: {{ date }}
    </div>
    <div class="divider"></div>
  </div>

  <div class="pagebreak"></div>

  <!-- CONTENT -->
  <h1>{{ section_title }}</h1>
  <p>{{ content }}</p>

  <div class="callout">{{ callout }}</div>

</body>
</html>
